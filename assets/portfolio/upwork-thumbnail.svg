  <rect width="1600" height="1200" fill="url(#violet)"/>
  <rect x="0" y="0" width="1600" height="1" fill="rgba(255,255,255,0.12)"/>

  <rect x="56" y="56" width="1488" height="1088" rx="28" stroke="rgba(255,255,255,0.07)"/>

