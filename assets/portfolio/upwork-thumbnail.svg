    <text x="517" y="1052" fill="#B8AEA3" font-size="12" font-family="IBM Plex Mono, Menlo, monospace" letter-spacing="1.8">PREMIUM WEB UI</text>

    <rect x="684" y="1030" width="184" height="36" rx="18" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)"/>
    <text x="709" y="1052" fill="#B8AEA3" font-size="12" font-family="IBM Plex Mono, Menlo, monospace" letter-spacing="1.8">PRODUCT STORYTELLING</text>
