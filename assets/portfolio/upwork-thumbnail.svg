    <text x="1000" y="680" fill="#B8AEA3" font-size="12" font-family="IBM Plex Mono, Menlo, monospace" letter-spacing="1.8">START THE BRIEF</text>
    <text x="1000" y="742" fill="#F5EFE8" font-size="46" font-family="Georgia, 'Times New Roman', serif" letter-spacing="-1.5">
