<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">Digital Design Studio Upwork Portfolio Thumbnail</title>
  <desc id="desc">Refined portfolio cover for Upwork with a balanced editorial layout, premium typography, and a clean digital studio interface composition.</desc>

  <defs>
    <linearGradient id="bg" x1="120" y1="70" x2="1410" y2="1120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#121318"/>
      <stop offset="0.52" stop-color="#0A0A0D"/>
      <stop offset="1" stop-color="#070709"/>
    </linearGradient>
    <radialGradient id="gold" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(280 220) rotate(20) scale(520 340)">
      <stop offset="0" stop-color="#C6A67A" stop-opacity="0.24"/>
      <stop offset="0.46" stop-color="#C6A67A" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#C6A67A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="violet" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1310 180) rotate(140) scale(360 260)">
