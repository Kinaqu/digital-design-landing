    <text x="1331" y="188" fill="#DDD4CA" font-size="10" font-family="IBM Plex Mono, Menlo, monospace" letter-spacing="1.8">LIVE</text>

    <rect x="970" y="400" width="186" height="198" rx="24" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.09)"/>
    <text x="1000" y="442" fill="#B8AEA3" font-size="12" font-family="IBM Plex Mono, Menlo, monospace" letter-spacing="1.8">BRAND SYSTEMS</text>
    <text x="1000" y="506" fill="#F5EFE8" font-size="34" font-family="Georgia, 'Times New Roman', serif" letter-spacing="-1.2">
