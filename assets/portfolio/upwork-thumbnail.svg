    </linearGradient>
    <linearGradient id="cta" x1="120" y1="0" x2="320" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F5EFE8"/>
      <stop offset="1" stop-color="#FFF8EF"/>
    </linearGradient>
