    <text x="1004" y="204" fill="#B8AEA3" font-size="13" font-family="IBM Plex Mono, Menlo, monospace" letter-spacing="2">SIGNATURE DIRECTION</text>
    <text x="1004" y="260" fill="#F5EFE8" font-size="47" font-family="Georgia, 'Times New Roman', serif" letter-spacing="-1.7">
