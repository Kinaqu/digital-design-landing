    <text x="1204" y="442" fill="#B8AEA3" font-size="12" font-family="IBM Plex Mono, Menlo, monospace" letter-spacing="1.8">BRAND FEEL</text>
    <text x="1204" y="506" fill="#F5EFE8" font-size="34" font-family="Georgia, 'Times New Roman', serif" letter-spacing="-1.2">
