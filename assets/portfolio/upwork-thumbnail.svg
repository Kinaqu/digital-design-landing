    <text x="148" y="969" fill="rgba(245,239,232,0.62)" font-size="18" font-family="Manrope, Arial, sans-serif">each year</text>

    <rect x="326" y="842" width="190" height="136" rx="24" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)"/>
    <text x="358" y="900" fill="#F5EFE8" font-size="56" font-family="Georgia, 'Times New Roman', serif" letter-spacing="-2">4w</text>
    <text x="358" y="941" fill="rgba(245,239,232,0.62)" font-size="18" font-family="Manrope, Arial, sans-serif">average sprint</text>
    <text x="358" y="969" fill="rgba(245,239,232,0.62)" font-size="18" font-family="Manrope, Arial, sans-serif">to first system</text>

    <rect x="536" y="842" width="190" height="136" rx="24" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)"/>
    <text x="568" y="900" fill="#F5EFE8" font-size="56" font-family="Georgia, 'Times New Roman', serif" letter-spacing="-2">3x</text>
    <text x="568" y="941" fill="rgba(245,239,232,0.62)" font-size="18" font-family="Manrope, Arial, sans-serif">stronger recall</text>
    <text x="568" y="969" fill="rgba(245,239,232,0.62)" font-size="18" font-family="Manrope, Arial, sans-serif">in review rooms</text>
